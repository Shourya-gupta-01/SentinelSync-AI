name: Staging Deployment Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Frontend Tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      # (Optional) Add frontend tests here
      # - name: Test Frontend
      #   working-directory: ./frontend
      #   run: npm test

      # Backend Tests
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # Add backend tests installation and execution commands here once backend is scaffolded.
      # - name: Install Backend Dependencies
      #   working-directory: ./backend/edge
      #   run: pip install -r requirements.txt
      # - name: Test Backend
      #   working-directory: ./backend/edge
      #   run: pytest

  build-and-push:
    name: Build and Push Docker Images
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # The user hasn't defined standard auth for GAR or GHCR yet.
      # We put a placeholder for Docker registry authentication.
      - name: Log in to Docker Registry
        run: echo "Insert docker login or gcloud auth here"
        
      - name: Build Next.js Frontend
        working-directory: ./frontend
        run: docker build -t sentinelsync-frontend:latest .

      - name: Build Python Triage Engine
        working-directory: ./backend/edge
        # We will add Dockerfile for edge, assuming standard container build rules.
        run: |
           if [ -f Dockerfile ]; then
              docker build -t sentinelsync-backend:latest .
           fi
