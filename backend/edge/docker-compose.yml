version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sentinel-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --set redpanda.enable_idempotence=true
    ports:
      - 8081:8081
      - 8082:8082
      - 9092:9092
      - 29092:29092
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  triage-engine:
    build: .
    container_name: sentinel-triage-engine
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKER_URL=redpanda:29092
      - MODEL_CACHE_DIR=/data/models
      # Will use placeholder for Gemini Flash edge model details
      - EDGE_MODEL_NAME=gemini-3-flash-edge-v1
    volumes:
      - model-cache:/data/models
    ports:
      - 8000:8000

volumes:
  redpanda-data:
  model-cache:
